name: CI

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails-and-unit:
    name: Guardrails and Unit
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Ensure gfortran
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gfortran >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          fi
          gfortran --version | head -n 1

      - name: Compile checks
        run: zig build check

      - name: Compile toolchain runners
        run: zig build tools-check

      - name: Unit tests
        run: zig build test

      - name: Lexer fuzz
        env:
          COL6FORGE_LEX_FUZZ_ITERS: "20000"
        run: zig build fuzz

  architecture-audit:
    name: Architecture Audit
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Architecture audit
        run: zig build architecture-audit

  golden:
    name: Golden
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Ensure gfortran
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gfortran >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          fi
          gfortran --version | head -n 1

      - name: Golden tests
        run: zig build golden -- --jobs 4

  nist-strict-verification:
    name: NIST Strict (${{ matrix.suite_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        include:
          - suite_name: fcvs21_f95
            build_arg: -Dfcvs21_f95
          - suite_name: FCSV78
            build_arg: -Dfcsv78
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Ensure gfortran
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gfortran >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          fi
          gfortran --version | head -n 1

      - name: NIST strict verification
        run: zig build verify-strict ${{ matrix.build_arg }} -- --jobs 1

  blas-verification:
    name: BLAS
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Ensure gfortran
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gfortran >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          fi
          gfortran --version | head -n 1

      - name: BLAS verification
        run: zig build blas-verify

  lapack-prepare:
    name: LAPACK Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Ensure gfortran
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gfortran >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          fi
          gfortran --version | head -n 1

      - name: Prepare LAPACK shared artifacts
        run: zig build lapack-verify -- --prepare-only

      - name: Archive LAPACK shared artifacts
        shell: bash
        run: |
          set -euo pipefail
          tar -czf lapack-prepare-artifacts.tgz zig-cache/lapack-verify/common zig-cache/lapack-verify/cache

      - name: Upload LAPACK shared artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lapack-prepare-artifacts
          path: lapack-prepare-artifacts.tgz
          if-no-files-found: error

  lapack-strict-verification:
    name: LAPACK Strict (${{ matrix.shard_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: lapack-prepare
    strategy:
      matrix:
        include:
          - shard_name: LIN S
            case_name: xlintsts
          - shard_name: LIN C
            case_name: xlintstc
          - shard_name: LIN D
            case_name: xlintstd
          - shard_name: LIN Z
            case_name: xlintstz
          - shard_name: LIN DS
            case_name: xlintstds
          - shard_name: LIN ZC
            case_name: xlintstzc
          - shard_name: EIG S
            case_name: xeigtsts
          - shard_name: EIG C
            case_name: xeigtstc
          - shard_name: EIG D
            case_name: xeigtstd
          - shard_name: EIG Z
            case_name: xeigtstz
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Ensure gfortran
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gfortran >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          fi
          gfortran --version | head -n 1

      - name: Download LAPACK shared artifacts
        uses: actions/download-artifact@v4
        with:
          name: lapack-prepare-artifacts

      - name: Restore LAPACK shared artifacts
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf lapack-prepare-artifacts.tgz

      - name: LAPACK strict verification
        run: zig build lapack-verify-strict -- --case ${{ matrix.case_name }}

  gcc-dg-experimental:
    name: GCC DG Experimental
    runs-on: ubuntu-latest
    timeout-minutes: 240
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Ensure gfortran
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gfortran >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          fi
          gfortran --version | head -n 1

      - name: GCC gfortran.dg verification
        run: zig build gcc-dg-verify
