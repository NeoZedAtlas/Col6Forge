name: CI

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails-and-unit:
    name: Guardrails and Unit
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Ensure gfortran
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gfortran >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          fi
          gfortran --version | head -n 1

      - name: Compile checks
        run: zig build check

      - name: Compile toolchain runners
        run: zig build tools-check

      - name: Architecture audit
        run: zig build architecture-audit

      - name: Unit tests
        run: zig build test

      - name: Lexer fuzz
        env:
          COL6FORGE_LEX_FUZZ_ITERS: "20000"
        run: zig build fuzz

  golden:
    name: Golden
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Ensure gfortran
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gfortran >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          fi
          gfortran --version | head -n 1

      - name: Golden tests
        run: zig build golden -- --jobs 4

  nist-strict-verification:
    name: NIST Strict (${{ matrix.suite_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        include:
          - suite_name: fcvs21_f95
            build_arg: -Dfcvs21_f95
          - suite_name: FCSV78
            build_arg: -Dfcsv78
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Ensure gfortran
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gfortran >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          fi
          gfortran --version | head -n 1

      - name: NIST strict verification
        run: zig build verify-strict ${{ matrix.build_arg }} -- --jobs 1

  blas-verification:
    name: BLAS
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Ensure gfortran
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gfortran >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          fi
          gfortran --version | head -n 1

      - name: BLAS verification
        run: zig build blas-verify

  lapack-strict-verification:
    name: LAPACK Strict (${{ matrix.shard_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        include:
          - shard_name: LIN
            filter: xlintst
          - shard_name: EIG S
            filter: xeigtsts
          - shard_name: EIG C
            filter: xeigtstc
          - shard_name: EIG D
            filter: xeigtstd
          - shard_name: EIG Z
            filter: xeigtstz
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Ensure gfortran
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gfortran >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          fi
          gfortran --version | head -n 1

      - name: LAPACK strict verification
        run: zig build lapack-verify-strict -- --filter ${{ matrix.filter }}

  perf-regression:
    name: Perf Regression
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Ensure gfortran
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gfortran >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          fi
          gfortran --version | head -n 1

      - name: Resolve baseline revision
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              echo "sha=$(git rev-parse HEAD^)" >> "$GITHUB_OUTPUT"
            else
              echo "sha=" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Benchmark baseline
        id: perf_base
        if: steps.base.outputs.sha != ''
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          git worktree add ../baseline_ref "${{ steps.base.outputs.sha }}"
          cd ../baseline_ref
          zig build perf-bench -- --output perf_base.json --iterations 3 --warmup 1

      - name: Benchmark candidate
        id: perf_head
        if: steps.base.outputs.sha != ''
        run: zig build perf-bench -- --output perf_head.json --iterations 3 --warmup 1

      - name: Compare performance reports
        if: steps.base.outputs.sha != '' && steps.perf_base.outcome == 'success'
        run: zig build perf-regress -- --base ../baseline_ref/perf_base.json --candidate perf_head.json --max-regression-pct 12

      - name: Upload performance artifacts
        if: always() && steps.base.outputs.sha != '' && steps.perf_head.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p perf-artifacts
          cp perf_head.json perf-artifacts/perf_head.json
          if [[ -f ../baseline_ref/perf_base.json ]]; then
            cp ../baseline_ref/perf_base.json perf-artifacts/perf_base.json
          fi

      - name: Publish performance artifacts
        if: always() && steps.base.outputs.sha != '' && steps.perf_head.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: perf-reports
          path: perf-artifacts
          if-no-files-found: ignore

      - name: Skip notice (no baseline revision)
        if: steps.base.outputs.sha == ''
        shell: bash
        run: |
          echo "::warning::No baseline revision available; skipping performance regression comparison."
          {
            echo "## Performance Compare Skipped"
            echo
            echo "- Reason: no baseline revision was available for this run."
            echo "- Candidate benchmark: not attempted."
            echo "- Action: no regression comparison was performed."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Skip notice (baseline benchmark unavailable)
        if: steps.base.outputs.sha != '' && steps.perf_base.outcome != 'success'
        shell: bash
        run: |
          echo "::warning::Baseline benchmark failed on the historical revision; performance regression comparison was skipped."
          {
            echo "## Performance Compare Skipped"
            echo
            echo "- Reason: baseline benchmark failed on the historical revision."
            echo "- Baseline revision: \`${{ steps.base.outputs.sha }}\`"
            echo "- Baseline benchmark outcome: \`${{ steps.perf_base.outcome }}\`"
            echo "- Candidate benchmark outcome: \`${{ steps.perf_head.outcome }}\`"
            echo "- Action: candidate benchmark still ran, but no regression comparison was performed."
            echo "- Follow-up: investigate baseline benchmark compatibility instead of ignoring this warning."
          } >> "$GITHUB_STEP_SUMMARY"

  gcc-dg-experimental:
    name: GCC DG Experimental
    runs-on: ubuntu-latest
    timeout-minutes: 240
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.15.2
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION"
          if [[ ! -x "$ZIG_DIR/zig" ]]; then
            mkdir -p "$ZIG_DIR"
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
            tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/zig-x86_64-linux-${ZIG_VERSION}"/* "$ZIG_DIR"/
          fi
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Ensure gfortran
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gfortran >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gfortran
          fi
          gfortran --version | head -n 1

      - name: GCC gfortran.dg verification
        run: zig build gcc-dg-verify
